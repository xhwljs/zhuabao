name: Build APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Create local.properties
        run: |
          touch local.properties
          echo "sdk.dir=$ANDROID_HOME" >> local.properties

      - name: Download Gradle
        run: |
          mkdir -p gradle/wrapper
          curl -sL https://services.gradle.org/distributions/gradle-8.4-bin.zip -o /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp
          echo "/tmp/gradle-8.4/bin/gradle" > gradle-bin
          chmod +x gradle-bin

      - name: Build debug APK
        run: /tmp/gradle-8.4/bin/gradle assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AnswerRevealer-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7
